name: gymsetlogger
description: "GymLog - Gym Set Logger App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0

  # Navigation
  go_router: ^14.0.0

  # Charts
  fl_chart: ^0.68.0

  # Export
  csv: ^6.0.0
  share_plus: ^12.0.2
  path_provider: ^2.1.3
  file_picker: ^8.0.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # UI
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.2.3

  # Date/Time helpers
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.22.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/exercises.json
